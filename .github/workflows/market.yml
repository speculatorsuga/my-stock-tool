name: market-check

on:
  schedule:
    - cron: "30 21 * * *"  # UTC 21:30 = 日本時間 翌朝6:30（遅延考慮で7時頃届く）
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: run script
        run: python market_check.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
